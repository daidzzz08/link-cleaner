<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Automation Toolkit - Tí Lò Xo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        #toast {
            visibility: hidden;
            opacity: 0;
            transform: translate(-50%, 20px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, 0);
        }
        textarea:focus { box-shadow: 0 0 0 2px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-[#fafafa] text-gray-900 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="mb-4">
            <h1 class="text-3xl font-bold tracking-tight text-gray-900 flex items-center gap-2">
                <i data-lucide="command" class="w-8 h-8 text-black"></i>
                Automation Toolkit
            </h1>
            <p class="text-gray-500 mt-2 text-sm">Bộ công cụ xử lý dữ liệu Auto Facebook nội bộ.</p>
        </header>

        <!-- Tabs Navigation -->
        <div class="flex space-x-6 border-b border-gray-200 mb-6">
            <button onclick="switchTab('log')" id="tabBtn-log" class="pb-3 text-sm font-semibold text-gray-900 border-b-2 border-black transition-colors flex items-center gap-2">
                <i data-lucide="terminal-square" class="w-4 h-4"></i> Log Analyzer
            </button>
            <button onclick="switchTab('link')" id="tabBtn-link" class="pb-3 text-sm font-medium text-gray-400 hover:text-gray-700 border-b-2 border-transparent transition-colors flex items-center gap-2">
                <i data-lucide="link" class="w-4 h-4"></i> Link Cleaner
            </button>
        </div>

        <!-- ========================================== -->
        <!-- TAB 1: LOG ANALYZER -->
        <!-- ========================================== -->
        <div id="tab-log" class="block animate-fade-in space-y-6">
            
            <!-- Input Area -->
            <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 rounded-t-xl">
                    <label for="logInput" class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Paste System Log Here
                    </label>
                    <button onclick="document.getElementById('logInput').value = ''; resetLogUI();" class="text-xs text-gray-400 hover:text-red-500 transition-colors">
                        Clear
                    </button>
                </div>
                <textarea id="logInput" 
                    class="w-full flex-grow min-h-[200px] p-4 text-sm font-mono bg-white outline-none resize-y placeholder-gray-300"
                    placeholder="[08:19:08] [61570721905242] ❌ FAILED | Reason: Mạng lỗi...&#10;[08:19:28] [61569091811363] ✅ SUCCESS...&#10;[08:19:51] [61566702421071] 🛑 STOPPED: Reached Max Fails..."></textarea>
            </div>

            <!-- Action Button -->
            <button onclick="analyzeLog()" class="w-full bg-black text-white hover:bg-gray-800 active:scale-[0.99] transition-all duration-200 py-4 rounded-xl font-medium shadow-md flex justify-center items-center gap-2">
                <i data-lucide="cpu" class="w-5 h-5"></i> Analyze Log Data
            </button>

            <!-- Results Grid (3 Columns) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- SUCCESS / LIVE -->
                <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200">
                    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-green-50/30 rounded-t-xl">
                        <span class="font-semibold text-sm text-green-700 flex items-center gap-2">
                            <span class="relative flex h-2.5 w-2.5">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                            </span> Live (Success)
                        </span>
                        <span id="liveCount" class="text-xs font-bold bg-green-100 text-green-700 px-2 py-1 rounded-full">0</span>
                    </div>
                    <textarea id="liveOutput" readonly class="w-full flex-grow p-3 text-sm font-mono bg-white outline-none resize-none h-[250px] text-gray-700"></textarea>
                    <div class="p-2 border-t border-gray-50">
                        <button onclick="copyText('liveOutput', 'Live IDs')" class="w-full py-2 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors flex justify-center items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copy Live
                        </button>
                    </div>
                </div>

                <!-- FAILED (Errors) -->
                <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200">
                    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-orange-50/30 rounded-t-xl">
                        <span class="font-semibold text-sm text-orange-600 flex items-center gap-2">
                            <i data-lucide="alert-triangle" class="w-4 h-4"></i> Failed (Errors)
                        </span>
                        <span id="failCount" class="text-xs font-bold bg-orange-100 text-orange-700 px-2 py-1 rounded-full">0</span>
                    </div>
                    <textarea id="failOutput" readonly class="w-full flex-grow p-3 text-sm font-mono bg-white outline-none resize-none h-[250px] text-gray-700"></textarea>
                    <div class="p-2 border-t border-gray-50">
                        <button onclick="copyText('failOutput', 'Failed IDs')" class="w-full py-2 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors flex justify-center items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copy Failed
                        </button>
                    </div>
                </div>

                <!-- DEAD (Max Fails) -->
                <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200">
                    <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-red-50/30 rounded-t-xl">
                        <span class="font-semibold text-sm text-red-600 flex items-center gap-2">
                            <i data-lucide="shield-alert" class="w-4 h-4"></i> Dead (Max Fails)
                        </span>
                        <span id="deadCount" class="text-xs font-bold bg-red-100 text-red-700 px-2 py-1 rounded-full">0</span>
                    </div>
                    <textarea id="deadOutput" readonly class="w-full flex-grow p-3 text-sm font-mono bg-white outline-none resize-none h-[250px] text-gray-700"></textarea>
                    <div class="p-2 border-t border-gray-50">
                        <button onclick="copyText('deadOutput', 'Dead IDs')" class="w-full py-2 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors flex justify-center items-center gap-2">
                            <i data-lucide="copy" class="w-4 h-4"></i> Copy Dead
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ========================================== -->
        <!-- TAB 2: LINK CLEANER -->
        <!-- ========================================== -->
        <div id="tab-link" class="hidden animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Left Column: Input -->
                <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 rounded-t-xl">
                        <label for="linkInput" class="font-semibold text-sm text-gray-700 flex items-center gap-2">
                            <i data-lucide="list" class="w-4 h-4"></i> Paste Raw Links Here
                        </label>
                        <button onclick="document.getElementById('linkInput').value = ''; resetLinkUI();" class="text-xs text-gray-400 hover:text-red-500 transition-colors">
                            Clear
                        </button>
                    </div>
                    <textarea id="linkInput" 
                        class="w-full flex-grow min-h-[500px] p-4 text-sm font-mono bg-white outline-none resize-none placeholder-gray-300"
                        placeholder="https://www.facebook.com/.../posts/pfbid...?comment_id=...&#10;https://www.facebook.com/permalink.php?story_fbid=...&id=...&comment_id=..."></textarea>
                </div>

                <!-- Right Column: Controls & Output -->
                <div class="flex flex-col gap-6">
                    <button onclick="processLinks()" class="w-full bg-black text-white hover:bg-gray-800 active:scale-[0.99] transition-all duration-200 py-4 rounded-xl font-medium shadow-md flex justify-center items-center gap-2">
                        <i data-lucide="filter" class="w-5 h-5"></i> Clean Links
                    </button>

                    <div class="flex flex-col bg-white p-1 rounded-2xl shadow-sm border border-gray-200 h-full">
                        <div class="p-3 border-b border-gray-100 flex justify-between items-center bg-blue-50/30 rounded-t-xl">
                            <span class="font-semibold text-sm text-blue-700 flex items-center gap-2">
                                <i data-lucide="check-circle" class="w-4 h-4"></i> Cleaned Links
                            </span>
                            <span id="cleanCount" class="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded-full">0</span>
                        </div>
                        <textarea id="linkOutput" readonly class="w-full flex-grow p-4 text-sm font-mono bg-white outline-none resize-none min-h-[300px] text-gray-700"></textarea>
                        <div class="p-2 border-t border-gray-50">
                            <button onclick="copyText('linkOutput', 'Cleaned Links')" class="w-full py-3 text-sm font-medium text-gray-600 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors flex justify-center items-center gap-2">
                                <i data-lucide="copy" class="w-4 h-4"></i> Copy Cleaned Links
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-lg flex items-center gap-2 text-sm font-medium z-50">
        <i data-lucide="check-circle-2" class="w-4 h-4 text-green-400" id="toastIcon"></i>
        <span id="toastMessage">Copied to clipboard!</span>
    </div>

    <script>
        lucide.createIcons();

        // --- TAB MANAGEMENT ---
        function switchTab(tabName) {
            document.getElementById('tabBtn-log').className = `pb-3 text-sm flex items-center gap-2 transition-colors ${tabName === 'log' ? 'font-semibold text-gray-900 border-b-2 border-black' : 'font-medium text-gray-400 hover:text-gray-700 border-b-2 border-transparent'}`;
            document.getElementById('tabBtn-link').className = `pb-3 text-sm flex items-center gap-2 transition-colors ${tabName === 'link' ? 'font-semibold text-gray-900 border-b-2 border-black' : 'font-medium text-gray-400 hover:text-gray-700 border-b-2 border-transparent'}`;

            document.getElementById('tab-log').style.display = tabName === 'log' ? 'block' : 'none';
            document.getElementById('tab-link').style.display = tabName === 'link' ? 'block' : 'none';
        }

        // --- TAB 1: LOG ANALYZER LOGIC ---
        function analyzeLog() {
            const rawText = document.getElementById('logInput').value;
            if (!rawText.trim()) return;

            const lines = rawText.split('\n');
            // Dùng Map để track state cuối cùng của mỗi UID (SUCCESS, FAILED, DEAD)
            const uidStatus = new Map();
            const uidRegex = /\[(\d{10,20})\]/;

            lines.forEach(line => {
                const match = line.match(uidRegex);
                if (match) {
                    const uid = match[1];
                    
                    if (line.includes('🛑 STOPPED') || line.includes('Reached Max Fails')) {
                        uidStatus.set(uid, 'DEAD');
                    } 
                    else if (line.includes('✅ SUCCESS')) {
                        // Nếu đã DEAD thì không cứu được nữa, nếu chưa thì update lên SUCCESS
                        if (uidStatus.get(uid) !== 'DEAD') {
                            uidStatus.set(uid, 'SUCCESS');
                        }
                    } 
                    else if (line.includes('❌ FAILED')) {
                        // Cập nhật FAILED (có thể đè SUCCESS cũ nếu die token giữa chừng)
                        if (uidStatus.get(uid) !== 'DEAD') {
                            uidStatus.set(uid, 'FAILED');
                        }
                    }
                }
            });

            // Phân loại mảng từ Map
            const liveArr = [];
            const failArr = [];
            const deadArr = [];

            uidStatus.forEach((status, uid) => {
                if (status === 'SUCCESS') liveArr.push(uid);
                else if (status === 'FAILED') failArr.push(uid);
                else if (status === 'DEAD') deadArr.push(uid);
            });

            // Update UI
            document.getElementById('liveOutput').value = liveArr.join('\n');
            document.getElementById('failOutput').value = failArr.join('\n');
            document.getElementById('deadOutput').value = deadArr.join('\n');
            
            document.getElementById('liveCount').innerText = liveArr.length;
            document.getElementById('failCount').innerText = failArr.length;
            document.getElementById('deadCount').innerText = deadArr.length;

            showToast(`Analysis: ${liveArr.length} Live | ${failArr.length} Failed | ${deadArr.length} Dead`);
        }

        function resetLogUI() {
            document.getElementById('liveOutput').value = '';
            document.getElementById('failOutput').value = '';
            document.getElementById('deadOutput').value = '';
            document.getElementById('liveCount').innerText = '0';
            document.getElementById('failCount').innerText = '0';
            document.getElementById('deadCount').innerText = '0';
        }

        // --- TAB 2: LINK CLEANER LOGIC ---
        function processLinks() {
            const input = document.getElementById('linkInput').value;
            if (!input.trim()) return;
            
            const lines = input.split('\n');
            const cleanLinks = [];
            
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;

                const urlMatch = line.match(/(https?:\/\/[^\s]+)/);
                if (!urlMatch) return;

                try {
                    let url = new URL(urlMatch[0]);

                    if (url.hostname.includes('facebook.com')) {
                        if (url.pathname.includes('/posts/') || 
                            url.pathname.includes('/videos/') || 
                            url.pathname.includes('/watch/') ||
                            url.pathname.includes('/photo.php')) { 
                            
                            if (url.pathname.includes('/posts/')) {
                                url.search = ""; 
                            } else {
                                url.searchParams.delete('comment_id');
                                url.searchParams.delete('reply_comment_id');
                                url.searchParams.delete('notif_id');
                                url.searchParams.delete('notif_t');
                                url.searchParams.delete('ref');
                                url.searchParams.delete('fbclid');
                            }
                        } 
                        else if (url.pathname.includes('permalink.php')) {
                            const paramsToKeep = ['story_fbid', 'id', 'v'];
                            const currentParams = Array.from(url.searchParams.keys());
                            
                            currentParams.forEach(key => {
                                if (!paramsToKeep.includes(key)) {
                                    url.searchParams.delete(key);
                                }
                            });
                        }
                        else {
                            url.searchParams.delete('comment_id');
                            url.searchParams.delete('reply_comment_id');
                            url.searchParams.delete('fbclid');
                            url.searchParams.delete('ref');
                            url.searchParams.delete('__cft__');
                            url.searchParams.delete('__tn__');
                        }
                    }
                    cleanLinks.push(url.toString());
                } catch (e) {
                    cleanLinks.push(urlMatch[0]); 
                }
            });

            document.getElementById('linkOutput').value = cleanLinks.join('\n');
            document.getElementById('cleanCount').innerText = cleanLinks.length;
            
            showToast(`Cleaned ${cleanLinks.length} links successfully!`);
        }

        function resetLinkUI() {
            document.getElementById('linkOutput').value = '';
            document.getElementById('cleanCount').innerText = '0';
        }

        // --- UTILS ---
        function copyText(elementId, name) {
            const textarea = document.getElementById(elementId);
            if (!textarea.value) {
                showToast('Nothing to copy!', true);
                return;
            }
            
            textarea.select();
            textarea.setSelectionRange(0, 99999); // For mobile devices
            
            try {
                // Sử dụng document.execCommand('copy') thay thế cho navigator.clipboard.writeText
                // để khắc phục triệt để lỗi phân quyền (Permissions Policy) trong môi trường iframe.
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast(`Copied ${name} to clipboard!`);
                } else {
                    showToast('Failed to copy!', true);
                }
            } catch (err) {
                console.error('Fallback copy failed', err);
                showToast('Failed to copy!', true);
            }
            
            // Xóa vùng chọn text để giao diện gọn gàng hơn
            window.getSelection().removeAllRanges();
        }

        let toastTimeout;
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMsg.innerText = message;
            toast.className = `fixed bottom-10 left-1/2 px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 text-sm font-medium z-50 transition-all duration-300 ${isError ? 'bg-red-600 text-white' : 'bg-gray-900 text-white'}`;
            
            if (isError) {
                toastIcon.setAttribute('data-lucide', 'alert-circle');
                toastIcon.classList.remove('text-green-400');
                toastIcon.classList.add('text-white');
            } else {
                toastIcon.setAttribute('data-lucide', 'check-circle-2');
                toastIcon.classList.add('text-green-400');
                toastIcon.classList.remove('text-white');
            }
            lucide.createIcons();

            toast.classList.add('show');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
